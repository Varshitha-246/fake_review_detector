<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ebe7ff; }
        .container {
            width: 350px; margin: 100px auto; background: #fff; padding: 60px;
            border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%; padding: 10px; margin-top: 8px;
            border: 1px solid #ccc; border-radius: 5px;
        }
        button { background-color: #3f3cff; color: white; cursor: pointer; }
        button:hover { background-color: #2b28d9; }
        a { color: #3f3cff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SIGN IN</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Sign In »</button>
        </form>
        <p>Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
    </div>
</body>
</html>
