{% extends 'base.html' %}

{% block content %}
<div class="container p-4">
    <h2>🔔 Notifications</h2>

    {% for msg in messages %}
    <div class="alert alert-info d-flex justify-content-between align-items-center">
        <div>
            <strong>Admin Reply:</strong> {{ msg.reply }} <br>
            <small><i>Your message: "{{ msg.message }}"</i></small>
        </div>

        {% if not msg.is_read %}
        <form method="post" action="{% url 'mark_read' %}">
        {% csrf_token %}
        <button class="btn btn-sm btn-success">Mark All as Read</button>
        </form>
        {% endif %}
    </div>
    {% endfor %}
</div>
{% endblock %}
