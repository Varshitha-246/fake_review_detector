{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h3>Reply to {{ message.name }}</h3>
    <p><strong>Message:</strong> {{ message.message }}</p>

    <form method="POST">
        {% csrf_token %}
        <textarea name="reply" class="form-control" rows="5" placeholder="Write reply..." required>{{ message.reply }}</textarea>
        <button class="btn btn-success mt-3" type="submit">Send Reply</button>
    </form>
</div>
{% endblock %}
